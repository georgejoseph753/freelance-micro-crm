version: "3.8"

services:
  # 1. The PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: micro_crm_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ernestrutherfordium
      POSTGRES_DB: micro_crm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  # 2. The Node.js Backend
  backend:
    build: ./backend
    container_name: micro_crm_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:ernestrutherfordium@db:5432/micro_crm
      - JWT_SECRET=super_secret_jwt_key_123
      - PORT=5000
    depends_on:
      - db

  # 3. The React Frontend (Nginx)
  frontend:
    build: ./frontend
    container_name: micro_crm_frontend
    restart: always
    ports:
      - "3000:80" # Maps your computer's port 3000 to Nginx's internal port 80
    depends_on:
      - backend

volumes:
  pgdata: